# toolstream.config.yaml - All servers proxied (github, obsidian, atlassian)

toolstream:
  transport:
    stdio: true
    http:
      enabled: false
      port: 3000
      host: "127.0.0.1"

  embedding:
    provider: "local"
    model: "all-MiniLM-L6-v2"

  routing:
    top_k: 5
    confidence_threshold: 0.3
    context_window_turns: 3

  storage:
    provider: "sqlite"
    sqlite_path: "/Users/tylerwick/projects/toolstream/toolstream.db"

servers:
  - id: "github"
    name: "GitHub"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    auth:
      type: "none"
    env_passthrough: ["GITHUB_PERSONAL_ACCESS_TOKEN"]

  - id: "obsidian"
    name: "Obsidian"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@mauricio.wolff/mcp-obsidian", "/Users/tylerwick/Vault"]
    auth:
      type: "none"

  - id: "mcp-atlassian"
    name: "Atlassian (Jira + Confluence)"
    transport: "stdio"
    command: "uvx"
    args: ["mcp-atlassian"]
    auth:
      type: "none"
    env_passthrough:
      - "JIRA_URL"
      - "JIRA_USERNAME"
      - "JIRA_API_TOKEN"
      - "CONFLUENCE_URL"
      - "CONFLUENCE_USERNAME"
      - "CONFLUENCE_API_TOKEN"
