# toolstream.config.yaml - Hybrid setup (github + obsidian proxied, atlassian direct)

toolstream:
  transport:
    stdio: true
    http:
      enabled: false
      port: 3000
      host: "127.0.0.1"

  embedding:
    provider: "local"
    model: "all-MiniLM-L6-v2"

  routing:
    top_k: 5
    confidence_threshold: 0.3
    context_window_turns: 3

  storage:
    provider: "sqlite"
    sqlite_path: "/Users/REDACTED/Projects/toolstream/toolstream.db"

servers:
  - id: "github"
    name: "GitHub"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    auth:
      type: "none"

  - id: "obsidian"
    name: "Obsidian"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@mauricio.wolff/mcp-obsidian", "/Users/REDACTED/Vault"]
    auth:
      type: "none"
