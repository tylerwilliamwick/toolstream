# toolstream.config.example.yaml
#
# COPY this file to toolstream.config.yaml for your personal configuration.
# toolstream.config.yaml is .gitignored and will never be committed.
# Never put real vault paths, API tokens, or service URLs in this file.
# Use toolstream.config.yaml (your local copy) for all personal values.
#
# Copy this file and customize it for your setup:
#   cp toolstream.config.example.yaml toolstream.config.yaml
#
# Then update the paths and server entries below.

toolstream:
  transport:
    stdio: true
    http:
      enabled: false
      port: 3000
      host: "127.0.0.1"

  embedding:
    provider: "local"
    model: "all-MiniLM-L6-v2"

  routing:
    top_k: 5
    confidence_threshold: 0.3
    context_window_turns: 3

  storage:
    provider: "sqlite"
    sqlite_path: "./toolstream.db"       # Relative to where you run the process

servers:
  # GitHub MCP Server
  - id: "github"
    name: "GitHub"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    auth:
      type: "none"
    env_passthrough: ["GITHUB_PERSONAL_ACCESS_TOKEN"]

  # Obsidian MCP Server (optional, remove if you don't use Obsidian)
  - id: "obsidian"
    name: "Obsidian"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@mauricio.wolff/mcp-obsidian", "/path/to/your/vault"]  # Replace with your vault path
    auth:
      type: "none"

  # Atlassian MCP Server (Jira + Confluence)
  - id: "mcp-atlassian"
    name: "Atlassian (Jira + Confluence)"
    transport: "stdio"
    command: "uvx"
    args: ["mcp-atlassian"]
    auth:
      type: "none"
    env_passthrough:
      - "JIRA_URL"
      - "JIRA_USERNAME"
      - "JIRA_API_TOKEN"
      - "CONFLUENCE_URL"
      - "CONFLUENCE_USERNAME"
      - "CONFLUENCE_API_TOKEN"
